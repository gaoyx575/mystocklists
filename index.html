<!DOCTYPE html>
<html lang="zh-CN">


<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我家囤货清单</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ====== 固定区域 ====== -->
    <div class="fixed-area">

        <div class="header">
            <h1>📦 我家囤货清单</h1>
            <span class="badge" id="countBadge">0 件</span>
            <span class="header-tip">📌 数据保存在浏览器本地 · 建议定期手动导出备份</span>
        </div>

        <div class="stats-row">
            <div class="stats" id="statsContainer"></div>
            <button class="btn btn-outline btn-sm stats-btn" onclick="window.location.href='stats.html'">📊
                查看统计</button>
            <button class="btn btn-outline btn-sm stats-btn" onclick="window.location.href='settings.html'">⚙️
                设置</button>
        </div>

        <div class="filter-bar">
            <span class="filter-label">🔍</span>
            <select id="filterCategory" onchange="render()">
                <option value="">全部</option>
            </select>
            <select id="statusFilter" onchange="render()">
                <option value="">全部状态</option>
            </select>
            <input type="text" id="filterKeyword" placeholder="搜名称..." style="flex:1; min-width:60px; max-width:120px;"
                oninput="render()">
            <button class="btn btn-outline btn-sm" onclick="clearFilters()">清除</button>
            <span class="divider">|</span>
            <button class="btn btn-add btn-sm" onclick="openAddModal()">＋新增</button>
            <button class="btn btn-outline btn-sm" onclick="exportData()">📤导出</button>
            <button class="btn btn-outline btn-sm"
                onclick="document.getElementById('fileInput').click()">📥导入文件</button>
            <input type="file" id="fileInput" accept=".json" onchange="importFile(event)">
            <span class="spacer"></span>
            <span class="data-source-tip">📁 <strong id="dataSourceLabel">加载中...</strong></span>
            <span class="divider">|</span>
            <span class="timer-inline">
                <span class="status-dot running" id="timerDot"></span>
                <span id="timerLabel">⏱ 加载中...</span>
                <span style="margin-left:8px; color:#94a3b8;">⏳ <span class="countdown"
                        id="countdownDisplay">--:--</span></span>
            </span>
        </div>

    </div>
    <!-- ====== 固定区域结束 ====== -->

    <!-- ====== 滚动区域 ====== -->
    <div class="scroll-area">
        <div class="list" id="itemList">
            <div class="empty">📭 暂无物品，点击「＋新增」添加</div>
        </div>
    </div>
    <!-- ====== 滚动区域结束 ====== -->

    <!-- 弹窗 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <div class="modal-title">
                <span id="modalTitle">✏️ 新增物品</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="form-rows-container" id="formRowsContainer">
                <!-- 由 modal.js 动态生成 -->
            </div>
            <div class="form-actions">
                <button class="btn btn-primary" id="modalSaveBtn" onclick="saveModalItem()">💾 保存</button>
                <button class="btn btn-outline" onclick="closeModal()">取消</button>
                <span id="modalEditHint" style="font-size:12px; color:#94a3b8; align-self:center;"></span>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="backup.js"></script>
    <script src="modal.js"></script>
    <script src="app.js"></script>
    <script>
        loadData();
    </script>
</body>

</html>
